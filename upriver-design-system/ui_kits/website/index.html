<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Upriver Consulting — Website UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="icon" href="../../assets/icon.svg"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; }
  [data-screen-label] { scroll-margin-top: 80px; }
  .kit-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .kit-section { padding: 80px 0; border-top: 1px solid rgba(68,56,40,0.5); }
  @media (min-width: 768px) { .kit-section { padding: 128px 0; } }
  .icon-stroke { stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .icon-stroke-bold { stroke-width: 2.5; }

  /* Button styles */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-heading); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; font-size: 14px; border: none; cursor: pointer; text-decoration: none; transition: all 150ms; }
  .btn-primary { background: linear-gradient(to bottom, #FF6B35, #F1551A); color: #1A1412; padding: 12px 28px; border-radius: 8px; box-shadow: 0 4px 0 #9e2b03, 0 10px 16px rgba(241,85,26,0.25); }
  .btn-primary:hover { background: linear-gradient(to bottom, #ff7a47, #F1551A); box-shadow: 0 4px 0 #9e2b03, 0 12px 20px rgba(241,85,26,0.35); }
  .btn-primary:active { transform: translateY(4px); box-shadow: 0 0 0 #9e2b03, 0 0 0 rgba(241,85,26,0); }
  .btn-secondary { background: #271E18; border: 1px solid #443828; color: #F1EAE4; padding: 12px 28px; border-radius: 8px; box-shadow: 0 4px 0 #1A1412, 0 8px 12px rgba(0,0,0,0.3); }
  .btn-secondary:hover { background: #2E241D; border-color: #9A8E83; }
  .btn-secondary:active { transform: translateY(4px); box-shadow: 0 0 0 #1A1412; }
  .btn-ghost { color: #F1551A; text-decoration: underline; text-underline-offset: 4px; background: none; padding: 0; }
  .btn-ghost:hover { color: #FF6B35; }

  /* Card */
  .up-card { background: #271E18; border: 1px solid #443828; border-radius: 12px; padding: 32px; transition: all 200ms; }
  .up-card.hoverable:hover { border-color: #F1551A; background: #2E241D; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(241,85,26,0.12); cursor: pointer; }

  /* Pill */
  .up-pill { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 6px; font-family: var(--font-heading); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; background: rgba(241,85,26,0.1); color: #F1551A; border: 1px solid rgba(241,85,26,0.2); }
  .up-pill-hero { border-radius: 9999px; padding: 6px 16px; border-color: rgba(241,85,26,0.3); background: #271E18; color: #9A8E83; }

  /* Quote block */
  .quote-block { background: #271E18; border-left: 4px solid #F1551A; border-radius: 0 16px 16px 0; padding: 40px; position: relative; overflow: hidden; }
  .quote-block::before { content: ""; position: absolute; top: -120px; right: -60px; width: 280px; height: 280px; background: #F1551A; opacity: 0.05; border-radius: 9999px; filter: blur(60px); pointer-events: none; }
  .quote-block > * { position: relative; z-index: 1; }

  /* Hero */
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 800px 400px at 50% 20%, rgba(241,85,26,0.08), transparent 60%),
      radial-gradient(ellipse 600px 300px at 80% 100%, rgba(241,85,26,0.06), transparent 60%),
      linear-gradient(180deg, #1A1412 0%, #0a0807 50%, #1A1412 100%);
    overflow: hidden;
  }
  .hero-bg::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(241,85,26,0.4), transparent);
  }

  .pinging { position: relative; display: inline-flex; width: 12px; height: 12px; }
  .pinging::before { content: ""; position: absolute; inset: 0; border-radius: 9999px; background: #F1551A; opacity: 0.75; animation: ping 1.6s cubic-bezier(0,0,0.2,1) infinite; }
  .pinging::after { content: ""; position: absolute; inset: 0; border-radius: 9999px; background: #F1551A; }
  @keyframes ping { 75%, 100% { transform: scale(2.2); opacity: 0; } }

  .fade-in { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  .nav-link { font-family: var(--font-heading); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: #BFB5AA; text-decoration: none; cursor: pointer; transition: color 200ms; }
  .nav-link:hover { color: #F1EAE4; }
  .nav-link.active { color: #F1551A; }
  .nav-link.highlight { color: rgba(241,85,26,0.8); }
  .nav-link.highlight:hover { color: #F1551A; }

  .service-icon {
    width: 64px; height: 64px; border-radius: 16px;
    background: #1A1412; border: 1px solid #443828;
    display: flex; align-items: center; justify-content: center;
    color: #F1551A; margin-bottom: 20px;
    transition: transform 300ms;
  }
  .up-card.hoverable:hover .service-icon { transform: scale(1.1) rotate(3deg); }
  .up-card.hoverable:hover .card-title { color: #F1551A; }
  .up-card .card-title { transition: color 200ms; }

  .chevron-anim { transition: transform 200ms; }
  .up-card.hoverable:hover .chevron-anim { transform: translateX(4px); }

  .input {
    width: 100%; background: #1A1412; border: 1px solid #4D4038; border-radius: 4px;
    color: #F1EAE4; padding: 10px 14px; font-family: var(--font-body); font-size: 15px;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .input:focus { outline: none; border-color: #F1551A; box-shadow: 0 0 0 1px rgba(241,85,26,0.3); }
  .input::placeholder { color: #9A8E83; }

  .form-label { display: block; font-family: var(--font-heading); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #F1EAE4; font-weight: 500; margin-bottom: 6px; }

  .stat-num { font-family: var(--font-heading); color: #F1551A; font-size: 48px; font-weight: 500; line-height: 1; }
  @media (min-width: 768px) { .stat-num { font-size: 64px; } }

  .footer-link { color: #BFB5AA; text-decoration: none; font-size: 14px; transition: color 200ms; }
  .footer-link:hover { color: #F1EAE4; }

  /* Nav state (scrolled look is always-on here for clarity) */
  .up-navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(26,20,18,0.95); backdrop-filter: blur(4px);
    border-bottom: 1px solid #443828;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ---------------- Icons (inline, matches repo stroke style) ----------------
const ArrowRight = (p) => <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" className={`icon-stroke ${p.bold?'icon-stroke-bold':''} ${p.className||''}`}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
const ChevronRight = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" className={`icon-stroke ${p.className||''}`}><path d="m9 18 6-6-6-6"/></svg>;
const Check = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" className={`icon-stroke icon-stroke-bold ${p.className||''}`} style={{color:'#F1551A'}}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
const IconBrain = () => <svg width={28} height={28} viewBox="0 0 24 24" className="icon-stroke"><path d="M9.5 2A2.5 2.5 0 0 0 7 4.5v.5a2.5 2.5 0 0 0-2 4.2A2.5 2.5 0 0 0 5 14a2.5 2.5 0 0 0 2 4.5v.5A2.5 2.5 0 0 0 9.5 22a2.5 2.5 0 0 0 2.5-2.5V4.5A2.5 2.5 0 0 0 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 1 17 4.5v.5a2.5 2.5 0 0 1 2 4.2 2.5 2.5 0 0 1 0 4.8 2.5 2.5 0 0 1-2 4.5v.5a2.5 2.5 0 0 1-2.5 2.5"/></svg>;
const IconCamera = () => <svg width={28} height={28} viewBox="0 0 24 24" className="icon-stroke"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3"/></svg>;
const IconChart = () => <svg width={28} height={28} viewBox="0 0 24 24" className="icon-stroke"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
const IconMail = () => <svg width={28} height={28} viewBox="0 0 24 24" className="icon-stroke"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>;
const IconStar = () => <svg width={28} height={28} viewBox="0 0 24 24" className="icon-stroke"><polygon points="12 2 15 9 22 10 17 15 18 22 12 19 6 22 7 15 2 10 9 9 12 2"/></svg>;
const IconMonitor = () => <svg width={28} height={28} viewBox="0 0 24 24" className="icon-stroke"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>;
const IconInstagram = () => <svg width={20} height={20} viewBox="0 0 24 24" className="icon-stroke"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>;
const IconYouTube = () => <svg width={20} height={20} viewBox="0 0 24 24" className="icon-stroke"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.13C5.12 19.56 12 19.56 12 19.56s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.43z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" fill="currentColor" stroke="none"/></svg>;

// ---------------- Navbar ----------------
function Navbar({ current, onNav }) {
  const links = [
    { id: 'home', label: 'Home' },
    { id: 'services', label: 'Services' },
    { id: 'how', label: 'How It Works' },
    { id: 'venues', label: 'For Venues' },
    { id: 'audit', label: 'Free Audit', highlight: true },
    { id: 'contact', label: 'Contact' },
  ];
  return (
    <nav className="up-navbar">
      <div className="kit-container" style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:72}}>
        <a onClick={() => onNav('home')} style={{fontFamily:'var(--font-heading)',color:'#F1EAE4',fontWeight:500,fontSize:22,textTransform:'uppercase',letterSpacing:'0.2em',cursor:'pointer',textDecoration:'none'}}>Upriver</a>
        <div style={{display:'flex',alignItems:'center',gap:32}}>
          {links.map(l => (
            <a key={l.id} onClick={() => onNav(l.id)} className={`nav-link ${current===l.id?'active':''} ${l.highlight?'highlight':''}`}>{l.label}</a>
          ))}
        </div>
      </div>
    </nav>
  );
}

// ---------------- Hero ----------------
function Hero({ onNav }) {
  return (
    <section data-screen-label="01 Hero" style={{position:'relative',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',paddingTop:80}}>
      <div className="hero-bg"/>
      <div className="kit-container" style={{position:'relative',zIndex:1,textAlign:'center',padding:'80px 24px'}}>
        <div className="fade-in">
          <div className="up-pill up-pill-hero" style={{marginBottom:32}}>
            <span className="pinging"/>
            <span>Accepting New Clients</span>
          </div>
        </div>
        <h1 className="fade-in" style={{maxWidth:920,margin:'0 auto 24px',animationDelay:'0.05s'}}>The Photographer Who Builds Your AI Systems</h1>
        <p className="fade-in" style={{maxWidth:720,margin:'0 auto 40px',color:'#BFB5AA',fontSize:'1.25rem',lineHeight:1.7,animationDelay:'0.1s'}}>
          Hudson Valley based small business owner for 25 years. Working photographer and filmmaker. Former Apple Creative. One person who can audit your sales process, set up the AI, write the prompts, shoot the video, and train your team.
        </p>
        <div className="fade-in" style={{display:'flex',gap:20,justifyContent:'center',marginBottom:40,flexWrap:'wrap',animationDelay:'0.15s'}}>
          <a className="btn btn-primary" onClick={() => onNav('audit')}>Get a Free 60-Second Audit <ArrowRight bold/></a>
          <a className="btn btn-secondary" onClick={() => onNav('venues')}>Wedding Venue? Start Here</a>
        </div>
        <div className="fade-in" style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap',animationDelay:'0.2s'}}>
          {['25 years in business','Former Apple Creative','Hudson Valley based'].map(t => (
            <span key={t} style={{display:'inline-flex',alignItems:'center',gap:8,background:'#271E18',padding:'8px 16px',borderRadius:6,border:'1px solid #443828',color:'#9A8E83',fontFamily:'var(--font-heading)',fontSize:12,textTransform:'uppercase',letterSpacing:'0.1em'}}>
              <Check size={14}/> {t}
            </span>
          ))}
        </div>
      </div>
    </section>
  );
}

// ---------------- Stat strip ----------------
function StatStrip() {
  const stats = [
    { n: '25+', l: 'Years in Business' },
    { n: '2', l: 'Years Building AI' },
    { n: '10+', l: 'Hours Saved Weekly' },
  ];
  return (
    <section style={{padding:'80px 0',background:'#0a0807',borderTop:'1px solid rgba(68,56,40,0.5)'}}>
      <div className="kit-container" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:24}}>
        {stats.map(s => (
          <div key={s.l} style={{textAlign:'center'}}>
            <div className="stat-num">{s.n}</div>
            <div style={{color:'#BFB5AA',marginTop:8,fontSize:14}}>{s.l}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

// ---------------- Services ----------------
function ServicesGrid() {
  const services = [
    { icon: <IconBrain/>, title: 'AI Foundation', desc: "Audit, set up, and train AI in your voice. You keep everything I build." },
    { icon: <IconMail/>, title: 'Inquiry Response', desc: "AI that replies to leads like you would. Trained on your actual FAQ, your tone." },
    { icon: <IconStar/>, title: 'Review Response', desc: "Never leave a review sitting for three weeks again. Drafts reviewed, then sent." },
    { icon: <IconChart/>, title: 'AI Search Visibility', desc: "Show up when someone asks ChatGPT or Claude about your kind of business." },
    { icon: <IconCamera/>, title: 'Video Production', desc: "Business intro, half-day, brand documentary. 25 years behind the camera." },
    { icon: <IconMonitor/>, title: 'Monthly Content Partner', desc: "One shoot per month. Social stops being sporadic, starts being a system." },
  ];
  return (
    <section data-screen-label="02 Services" className="kit-section">
      <div className="kit-container">
        <h2 style={{marginBottom:16}}>What I Do</h2>
        <p style={{color:'#BFB5AA',maxWidth:680,marginBottom:48,fontSize:18}}>Consulting and content production from the same person. Audit on one side, real creative output on the other.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:24}}>
          {services.map(s => (
            <div key={s.title} className="up-card hoverable" style={{position:'relative'}}>
              <div className="service-icon">{s.icon}</div>
              <h3 className="card-title" style={{marginBottom:12}}>{s.title}</h3>
              <p style={{color:'#BFB5AA',marginBottom:24,fontSize:16,lineHeight:1.6}}>{s.desc}</p>
              <div style={{display:'inline-flex',alignItems:'center',gap:8,color:'#F1EAE4',fontFamily:'var(--font-heading)',textTransform:'uppercase',letterSpacing:'0.08em',fontSize:13,fontWeight:500}}>
                Explore service
                <ChevronRight className="chevron-anim" style={{color:'#F1551A'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ---------------- AI take ----------------
function HonestAI() {
  const cards = [
    { t: 'Worried about AI slop?', d: "Same. That's the whole reason I build custom systems instead of handing you a generic ChatGPT login. Everything gets trained on your voice, your FAQ, your standards." },
    { t: 'Privacy or energy concerns?', d: "We can run models locally on your own machine. Your data never leaves the room. Slower than Claude, but for a lot of tasks more than enough." },
    { t: "Can't keep up with the changes?", d: "Nobody can. This stuff changes literally every few days. That's the reason to hire someone whose job is staying on top of it." },
    { t: 'Tired of paying for a dozen SaaS tools?', d: "Same. A custom setup you own outright usually costs less in a year than what you're paying monthly for tools you barely use." },
  ];
  return (
    <section data-screen-label="03 Honest AI" className="kit-section">
      <div className="kit-container">
        <h2 style={{marginBottom:16}}>An Honest Take on AI</h2>
        <p style={{color:'#BFB5AA',maxWidth:760,marginBottom:48,fontSize:18}}>
          AI has real problems. The output is often slop that makes businesses look unprofessional. I see my job as helping people get ready for what's coming, not selling them a fantasy.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(340px,1fr))',gap:24,marginBottom:48}}>
          {cards.map(c => (
            <div key={c.t} className="up-card" style={{borderRadius:16}}>
              <h3 style={{marginBottom:12,fontSize:20}}>{c.t}</h3>
              <p style={{color:'#BFB5AA'}}>{c.d}</p>
            </div>
          ))}
        </div>
        <div className="quote-block">
          <h3 style={{fontSize:28,marginBottom:20}}>Not just for big companies with big budgets</h3>
          <p style={{color:'#BFB5AA',marginBottom:16}}>
            Every other AI consultant wants six-figure retainers from enterprise clients. I'm a solopreneur myself. 25 years of running my own small business. If you're a one-person shop, I'd love to help you build something that gives you back your evenings.
          </p>
          <p style={{color:'#BFB5AA'}}>
            And if you have a team, the goal isn't to replace your admins. It's to free them from the grinding computer work so they can focus on the human parts of their jobs.
          </p>
        </div>
      </div>
    </section>
  );
}

// ---------------- CTA / Three ways ----------------
function ThreeWays({ onNav }) {
  const [selected, setSelected] = useState(null);
  const options = [
    { id: 1, tag: 'Fastest', primary: true, title: 'Free 60-Second Audit', desc: 'Answer 8 questions. Claude reads your site and generates a specific action plan with quick wins and gaps.', cta: 'Start the Audit', to: 'audit' },
    { id: 2, tag: '20 minutes', title: 'Discovery Call', desc: "Book a time on my calendar. We'll talk about your business and whether any of this would actually help.", cta: 'Book a Call', to: 'contact' },
    { id: 3, tag: 'No commitment', title: 'Just Send a Note', desc: 'Email, phone, or a quick contact form. I read every message myself.', cta: 'Get in Touch', to: 'contact' },
  ];
  return (
    <section data-screen-label="04 Three Ways" className="kit-section" style={{background:'#271E18',borderTop:'1px solid rgba(68,56,40,0.5)'}}>
      <div className="kit-container">
        <h2 style={{marginBottom:16}}>Three Ways to Start</h2>
        <p style={{color:'#BFB5AA',maxWidth:680,marginBottom:40,fontSize:18}}>Select an option below. All three are free, and there's no sales pressure on any of them.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:24}}>
          {options.map(o => {
            const active = selected === o.id;
            return (
              <div key={o.id} onClick={() => setSelected(o.id)} style={{
                position:'relative',cursor:'pointer',borderRadius:16,padding:32,
                background:'#1A1412',
                border:`2px solid ${active ? '#F1551A' : (o.primary ? 'rgba(241,85,26,0.5)' : '#443828')}`,
                boxShadow: active ? '0 0 0 4px rgba(241,85,26,0.1)' : 'none',
                transform: active ? 'translateY(-8px)' : 'none',
                transition: 'all 200ms',
              }}>
                <div style={{position:'absolute',top:24,right:24,width:24,height:24,borderRadius:9999,border:`2px solid ${active?'#F1551A':'#443828'}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <div style={{width:12,height:12,borderRadius:9999,background:'#F1551A',transform:active?'scale(1)':'scale(0)',transition:'transform 200ms'}}/>
                </div>
                <span className="up-pill" style={{marginBottom:24,background:o.primary?'rgba(241,85,26,0.2)':'#271E18',color:o.primary?'#F1551A':'#F1EAE4',borderColor:o.primary?'rgba(241,85,26,0.3)':'#443828'}}>{o.tag}</span>
                <h3 style={{fontSize:22,marginBottom:12}}>{o.title}</h3>
                <p style={{color:'#BFB5AA',fontSize:14,marginBottom:24,minHeight:80}}>{o.desc}</p>
                <a className={active ? 'btn btn-primary' : 'btn btn-secondary'} style={{width:'100%'}} onClick={(e) => { e.stopPropagation(); onNav(o.to); }}>{o.cta}</a>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

// ---------------- Audit screen ----------------
function AuditScreen({ onNav }) {
  const [step, setStep] = useState(0);
  const questions = [
    { q: "What's your business, in one sentence?", ph: 'e.g. Wedding venue in the Hudson Valley, 80-guest capacity.' },
    { q: 'What eats the most of your week?', ph: 'e.g. Responding to inquiries. Review responses. Social posts.' },
    { q: 'What tools do you already use?', ph: 'e.g. HoneyBook, Gmail, Google Business Profile.' },
  ];
  const [answer, setAnswer] = useState('');
  const done = step >= questions.length;
  return (
    <section data-screen-label="05 Audit" className="kit-section" style={{minHeight:'80vh'}}>
      <div className="kit-container" style={{maxWidth:720}}>
        <span className="up-pill" style={{marginBottom:24}}>Free 60-Second Audit</span>
        {!done ? (
          <>
            <h1 style={{fontSize:48,marginBottom:32}}>{questions[step].q}</h1>
            <textarea className="input" rows={4} placeholder={questions[step].ph} value={answer} onChange={(e)=>setAnswer(e.target.value)} style={{resize:'vertical',marginBottom:24}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:'#9A8E83',fontFamily:'var(--font-heading)',fontSize:12,textTransform:'uppercase',letterSpacing:'0.1em'}}>Question {step+1} of {questions.length}</span>
              <a className="btn btn-primary" onClick={() => { setStep(step+1); setAnswer(''); }}>{step === questions.length-1 ? 'Get My Plan' : 'Next'} <ArrowRight bold/></a>
            </div>
          </>
        ) : (
          <div className="quote-block">
            <h2 style={{marginBottom:16}}>Your Plan</h2>
            <h3 style={{fontSize:28,marginBottom:20}}>Three things to try first</h3>
            <ol style={{color:'#BFB5AA',paddingLeft:20,lineHeight:1.8}}>
              <li>Set up an AI inquiry draft in HoneyBook. Pulls from your FAQ. You hit send.</li>
              <li>Add a weekly review-response block, 30 minutes, AI-drafted.</li>
              <li>One half-day shoot in the next 60 days. 8-12 clips for everything else.</li>
            </ol>
            <div style={{marginTop:32,display:'flex',gap:16,flexWrap:'wrap'}}>
              <a className="btn btn-primary" onClick={() => onNav('contact')}>Book a Discovery Call <ArrowRight bold/></a>
              <a className="btn btn-secondary" onClick={() => { setStep(0); setAnswer(''); }}>Start Over</a>
            </div>
          </div>
        )}
      </div>
    </section>
  );
}

function App() {

  return (
    <>
      <Navbar current={screen} onNav={nav}/>
      {screen === 'home' && <>
        <Hero onNav={nav}/>
        <StatStrip/>
        <ServicesGrid/>
        <HonestAI/>
        <ThreeWays onNav={nav}/>
      </>}
      {screen === 'services' && <><div style={{height:80}}/><ServicesGrid/></>}
      {screen === 'how' && <HowItWorksScreen/>}

}
