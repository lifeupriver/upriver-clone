<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
  <span class="pill">Fastest</span>
  <span class="pill">25+ Years</span>
  <span class="pill pill--hero">
    <span style="position:relative; display:inline-flex; width:8px; height:8px; margin-right:8px;">
      <span style="position:absolute; inset:0; border-radius:9999px; background:#F1551A; opacity:0.6;"></span>
      <span style="position:absolute; inset:0; border-radius:9999px; background:#F1551A; transform:scale(0.6);"></span>
    </span>
    Accepting New Clients
  </span>
  <span style="display:inline-flex; align-items:center; gap:8px; background:#271E18; padding:8px 14px; border-radius:6px; border:1px solid #443828; color:#9A8E83; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:11px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F1551A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Former Apple Creative
  </span>
</div>
<div style="margin-top:14px; font-family:var(--font-body); font-size:11px; color:#9A8E83;">Pill badge (sharp) · Hero pill (rounded + status dot) · Proof chip</div></div></body>
</html>
