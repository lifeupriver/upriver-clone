<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div style="display:flex; gap:20px; align-items:center;">
  <div style="background:#271E18; border:1px solid #443828; border-radius:12px; padding:20px 24px; color:#F1EAE4; font-family:var(--font-heading); font-weight:500; font-size:15px;">At rest</div>
  <div style="background:#2E241D; border:1px solid #F1551A; border-radius:12px; padding:20px 24px; color:#F1EAE4; font-family:var(--font-heading); font-weight:500; font-size:15px; box-shadow:0 10px 30px rgba(241,85,26,0.12); transform:translateY(-4px);">Hover</div>
  <div style="display:inline-flex; align-items:center; gap:8px; background:linear-gradient(to bottom, #FF6B35, #F1551A); color:#1A1412; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.08em; font-size:13px; font-weight:500; padding:10px 20px; border-radius:8px; box-shadow:0 4px 0 #9e2b03, 0 10px 16px rgba(241,85,26,0.25);">Primary btn</div>
</div>
<div style="margin-top:12px; font-family:var(--font-body); font-size:11px; color:#9A8E83;">Rest: none · Hover: 0 10px 30px accent/12 · Button: hard 4px + accent glow</div></div></body>
</html>
