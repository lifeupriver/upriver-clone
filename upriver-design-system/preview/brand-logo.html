<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}

</style>
</head>
<body><div class="frame">
<div style="display:flex; gap:40px; align-items:center;">
  <div style="background:#1A1412; padding:14px; border-radius:12px; display:inline-flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 32 32">
      <rect width="32" height="32" fill="#1A1412"/>
      <path d="M6 22 L16 6 L26 22" stroke="#F1551A" stroke-width="3.5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
      <line x1="10" y1="15" x2="22" y2="15" stroke="#F1551A" stroke-width="2.5" stroke-linecap="square"/>
    </svg>
  </div>
  <div>
    <div style="font-family:var(--font-heading); color:#F1EAE4; font-weight:500; font-size:24px; text-transform:uppercase; letter-spacing:0.2em;">Upriver</div>
    <div style="font-family:var(--font-body); color:#9A8E83; font-size:13px; margin-top:4px;">AI + Content Consulting</div>
  </div>
