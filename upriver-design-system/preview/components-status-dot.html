<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div style="display:flex; gap:18px; align-items:center;">
  <div style="display:inline-flex; align-items:center; gap:10px; background:#271E18; border:1px solid #443828; border-radius:9999px; padding:6px 14px;">
    <span style="position:relative; display:inline-flex; width:12px; height:12px;">
      <span style="position:absolute; inset:0; border-radius:9999px; background:#F1551A; opacity:0.75; animation: ping 1.6s cubic-bezier(0,0,0.2,1) infinite;"></span>
      <span style="position:absolute; inset:0; border-radius:9999px; background:#F1551A;"></span>
    </span>
    <span style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.12em; color:#9A8E83; font-size:11px; font-weight:500;">Accepting New Clients</span>
  </div>
  <div style="display:inline-flex; align-items:center; gap:10px;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F1551A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span style="font-family:var(--font-body); color:#4A9B6E; font-size:13px;">Sent. Response within 24 hours.</span>
  </div>
</div>
<style>@keyframes ping{75%,100%{transform:scale(2.2);opacity:0;}}</style></div></body>
</html>
