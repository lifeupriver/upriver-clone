<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div class="grid" style="grid-template-columns: repeat(3, 1fr); gap:20px;">
  <div>
    <div class="chip" style="background:#F1EAE4; height:56px; border-radius:8px; display:flex; align-items:center; justify-content:center;">
      <span style="color:#1A1412; font-family:var(--font-heading); font-size:20px; font-weight:500;">Heading</span>
    </div>
    <div style="margin-top:8px; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:11px; color:#F1EAE4;">text-heading</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#BFB5AA;">#F1EAE4</div>
  </div>
  <div>
    <div class="chip" style="background:#271E18; height:56px; border:1px solid #443828; border-radius:8px; display:flex; align-items:center; justify-content:center;">
      <span style="color:#BFB5AA; font-family:var(--font-body); font-size:15px;">Body copy</span>
    </div>
    <div style="margin-top:8px; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:11px; color:#F1EAE4;">text-body</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#BFB5AA;">#BFB5AA</div>
  </div>
  <div>
    <div class="chip" style="background:#271E18; height:56px; border:1px solid #443828; border-radius:8px; display:flex; align-items:center; justify-content:center;">
      <span style="color:#9A8E83; font-family:var(--font-body); font-size:12px; text-transform:uppercase; letter-spacing:0.08em;">Muted label</span>
    </div>
    <div style="margin-top:8px; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:11px; color:#F1EAE4;">text-muted</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#BFB5AA;">#9A8E83</div>
  </div>
</div></div></body>
</html>
