<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
  <span class="pill">Fastest</span>
  <span class="pill pill--hero">Accepting New Clients</span>
  <span style="color:#F1551A; font-family:var(--font-mono); font-size:18px;">$2,000/mo</span>
  <span style="color:#F1551A; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.12em; font-size:13px;">Active Link</span>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F1551A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
</div>
<div style="margin-top:14px; font-family:var(--font-body); font-size:13px; color:#9A8E83; line-height:1.5;">Accent is used only on CTAs, hover titles, icons, prices, active nav, and focus rings. Never as a body color.</div></div></body>
</html>
