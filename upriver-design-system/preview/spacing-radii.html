<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div style="display:flex; gap:16px; align-items:flex-end;">
  <div style="text-align:center;"><div style="width:64px; height:64px; background:#271E18; border:1px solid #443828; border-radius:4px;"></div><div style="margin-top:8px; font-family:var(--font-mono); color:#BFB5AA; font-size:11px;">4px</div><div style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:10px; color:#9A8E83;">input</div></div>
  <div style="text-align:center;"><div style="width:64px; height:64px; background:#271E18; border:1px solid #443828; border-radius:8px;"></div><div style="margin-top:8px; font-family:var(--font-mono); color:#BFB5AA; font-size:11px;">8px</div><div style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:10px; color:#9A8E83;">button</div></div>
  <div style="text-align:center;"><div style="width:64px; height:64px; background:#271E18; border:1px solid #443828; border-radius:12px;"></div><div style="margin-top:8px; font-family:var(--font-mono); color:#BFB5AA; font-size:11px;">12px</div><div style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:10px; color:#9A8E83;">card</div></div>
  <div style="text-align:center;"><div style="width:64px; height:64px; background:#271E18; border:1px solid #443828; border-radius:16px;"></div><div style="margin-top:8px; font-family:var(--font-mono); color:#BFB5AA; font-size:11px;">16px</div><div style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:10px; color:#9A8E83;">hero</div></div>
  <div style="text-align:center;"><div style="width:64px; height:64px; background:#271E18; border:1px solid #443828; border-radius:9999px;"></div><div style="margin-top:8px; font-family:var(--font-mono); color:#BFB5AA; font-size:11px;">full</div><div style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.1em; font-size:10px; color:#9A8E83;">pill</div></div>
</div></div></body>
</html>
