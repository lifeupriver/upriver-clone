<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
  <div style="background:#271E18; border:1px solid #443828; border-radius:4px; padding:16px; text-align:center;">
    <div style="font-family:var(--font-heading); color:#F1551A; font-size:28px; font-weight:500;">25+</div>
    <div style="font-family:var(--font-body); color:#BFB5AA; font-size:12px; margin-top:4px;">Years in business</div>
  </div>
  <div style="background:#271E18; border:1px solid #443828; border-radius:4px; padding:16px; text-align:center;">
    <div style="font-family:var(--font-heading); color:#F1551A; font-size:28px; font-weight:500;">2</div>
    <div style="font-family:var(--font-body); color:#BFB5AA; font-size:12px; margin-top:4px;">Years building AI</div>
  </div>
  <div style="background:#271E18; border:1px solid #443828; border-radius:4px; padding:16px; text-align:center;">
    <div style="font-family:var(--font-heading); color:#F1551A; font-size:28px; font-weight:500;">10+</div>
    <div style="font-family:var(--font-body); color:#BFB5AA; font-size:12px; margin-top:4px;">Hours saved weekly</div>
  </div>
</div></div></body>
</html>
