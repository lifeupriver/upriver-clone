<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div class="grid" style="grid-template-columns: repeat(5, 1fr);">
  <div class="swatch"><div class="chip" style="background:#0a0807"></div><div><div class="name">deep</div><div class="hex">#0a0807</div></div></div>
  <div class="swatch"><div class="chip" style="background:#1A1412"></div><div><div class="name">primary</div><div class="hex">#1A1412</div></div></div>
  <div class="swatch"><div class="chip" style="background:#271E18"></div><div><div class="name">surface</div><div class="hex">#271E18</div></div></div>
  <div class="swatch"><div class="chip" style="background:#2E241D"></div><div><div class="name">surf hover</div><div class="hex">#2E241D</div></div></div>
  <div class="swatch"><div class="chip" style="background:#443828"></div><div><div class="name">border</div><div class="hex">#443828</div></div></div>
</div></div></body>
</html>
