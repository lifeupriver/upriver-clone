<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1412;}
  .frame{padding:22px 26px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-family:var(--font-heading);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;background:rgba(241,85,26,0.1);color:#F1551A;border:1px solid rgba(241,85,26,0.2);}
  .pill--hero{border-radius:9999px;padding:6px 14px;border-color:rgba(241,85,26,0.3);}
</style>
</head>
<body><div class="frame">
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
  <div>
    <div style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.08em; font-size:10px; color:#F1EAE4; font-weight:500; margin-bottom:4px;">Name <span style="color:#F1551A;">*</span></div>
    <div style="background:#1A1412; border:1px solid #4D4038; border-radius:4px; padding:9px 12px; font-family:var(--font-body); color:#F1EAE4; font-size:13px;">Joshua Brown</div>
  </div>
  <div>
    <div style="font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.08em; font-size:10px; color:#F1EAE4; font-weight:500; margin-bottom:4px;">Email <span style="color:#F1551A;">*</span></div>
    <div style="background:#1A1412; border:1px solid #F1551A; box-shadow:0 0 0 1px rgba(241,85,26,0.3); border-radius:4px; padding:9px 12px; font-family:var(--font-body); color:#F1EAE4; font-size:13px;">you@example.com</div>
  </div>
</div>
<div style="margin-top:12px; font-family:var(--font-body); font-size:11px; color:#9A8E83;">Label: heading font, 10px uppercase · Input: bg-primary + 1px border-input · Focus: accent border + glow ring</div></div></body>
</html>
