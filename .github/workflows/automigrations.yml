name: automigrations

# Applies new Supabase migrations on push to main.
#
# Triggers when files under supabase/migrations/ change OR on manual dispatch.
# Uses three repo secrets:
#   SUPABASE_ACCESS_TOKEN  - account-level token (Supabase Account → Access Tokens)
#   SUPABASE_PROJECT_REF   - the project ref (qavbpfmhgvkhrnbqalrp)
#   SUPABASE_DB_PASSWORD   - the DB password (set during project create / via Reset password)
#
# Secrets are passed as env vars (not string-interpolated into the shell)
# to keep them out of run-script command lines and process listings.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/automigrations.yml'
  workflow_dispatch:

# Don't let two simultaneous pushes race on `db push --linked`.
concurrency:
  group: automigrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$PROJECT_REF" --password "$DB_PASSWORD"
          supabase db push --linked --password "$DB_PASSWORD"
