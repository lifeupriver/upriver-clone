name: worker-image

# Builds the worker container and pushes it to GHCR. Runs:
#   - on push to main when packages/worker, packages/cli, packages/core, or
#     this workflow file change
#   - on a v* tag (cuts an immutable image)
#   - on manual dispatch
#
# Image: ghcr.io/lifeupriver/upriver-worker
# Tags pushed: sha-<short>, latest (main only), v<tag> (tag pushes only).
#
# Security note: this workflow uses no untrusted user input in run: scripts.
# `github.actor` (login resolution by GitHub) and `secrets.GITHUB_TOKEN` are
# the only template expansions, both auto-managed by GitHub.

on:
  push:
    branches: [main]
    paths:
      - 'packages/worker/**'
      - 'packages/cli/**'
      - 'packages/core/**'
      - 'packages/audit-passes/**'
      - 'packages/scaffold-template/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/worker-image.yml'
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: worker-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lifeupriver/upriver-worker
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/lifeupriver/upriver-worker:buildcache
          cache-to: type=registry,ref=ghcr.io/lifeupriver/upriver-worker:buildcache,mode=max
