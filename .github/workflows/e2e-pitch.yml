# Spec 19: gated live pitch e2e — runs the FULL pitch pipeline against the
# owned hosted fixture site (homepage scrape + 1 clone session + 4 teaser
# sessions) and asserts every prospect-facing surface.
#
# THIS WORKFLOW COSTS REAL MONEY every time it runs. Manual dispatch only,
# BY DESIGN — it must NEVER gain pull_request, push, or schedule triggers.
# The inverse invariant holds too (Spec 15): the keyless test.yml must never
# gain these secrets.
#
# The target is ALWAYS the owned fixture site. Never point this at a real
# prospect: the e2e exists to prove the machinery, not to spam anyone.

name: e2e-pitch (live)

on:
  workflow_dispatch:
    inputs:
      start_phase:
        description: Harness phase to start from (resume support).
        type: choice
        options:
          - run
          - artifacts
          - portal
          - questionnaire
          - approve
          - convert
          - revoke
          - verify
        default: run

permissions:
  contents: read

# One shared fixture target and one wallet — never overlap runs; a live run
# should not be killed mid-clone, so no cancel-in-progress.
concurrency:
  group: e2e-pitch
  cancel-in-progress: false

jobs:
  pitch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Fail fast if secrets missing
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          missing=0
          if [ -z "$FIRECRAWL_API_KEY" ]; then
            echo "::error::Secret FIRECRAWL_API_KEY is not set."
            missing=1
          fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Secret ANTHROPIC_API_KEY is not set."
            missing=1
          fi
          [ "$missing" -eq 0 ] || exit 1
          echo "Required secrets present."

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/scaffold-template/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install claude CLI (clone + teaser sessions shell out to it)
        run: npm i -g @anthropic-ai/claude-code

      - name: Install Playwright chromium (clone-fidelity screenshots)
        run: pnpm --filter @upriver/cli exec playwright install --with-deps chromium

      - name: Run pitch e2e harness
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UPRIVER_USE_API_KEY: '1'
          # Optional real-send leg: set all three (plus a postal address) to
          # exercise an actual Resend delivery to a TEST inbox.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PITCH_TEST_INBOX: ${{ vars.PITCH_TEST_INBOX }}
          UPRIVER_UNSUBSCRIBE_SECRET: ${{ secrets.UPRIVER_UNSUBSCRIBE_SECRET }}
          UPRIVER_OUTREACH_POSTAL: ${{ vars.UPRIVER_OUTREACH_POSTAL }}
        run: bash scripts/e2e-pitch.sh "${{ inputs.start_phase }}"

      - name: Upload harness logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pitch-e2e-logs
          path: |
            clients/pitch-fixture/e2e/
          if-no-files-found: ignore
