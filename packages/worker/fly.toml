# fly.toml app configuration file generated for upriver-worker on 2026-04-30T22:10:04-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'upriver-worker'
primary_region = 'iad'

[build]
  # Path is relative to this fly.toml's directory (packages/worker/).
  # Build context is supplied at deploy time (`fly deploy` from repo root).
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8288'

[http_service]
  internal_port = 8288
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
