# Monthly QA — intentionally a disabled stub.
#
# An earlier version of this workflow installed `@upriver/cli` from npm and
# ran QA from inside the client repo. The CLI is not published to npm and
# the flags it used (`--slug` / `--url`) never existed, so it could never
# work. Monthly QA runs from the operator's Upriver workspace instead —
# that's where the CLI, the client's audit baseline, and the API keys live:
#
#     upriver qa <slug> --preview-url <production-url>
#
# Cadence: 1st of each month, operator-side. See README.md ("Monthly QA").
#
# This stub is manual-trigger only (no cron) and does nothing; it stays in
# the repo so the QA story is documented where people look for it. If you
# ever add real build steps here, note this site requires Node >= 22 (see
# package.json `engines` and .nvmrc).
name: Monthly QA (operator-side — stub)

on:
  workflow_dispatch:

permissions: {}

jobs:
  explain:
    runs-on: ubuntu-latest
    steps:
      - name: Explain where monthly QA runs
        run: |
          echo "Monthly QA does not run in this repo."
          echo "It runs from the operator's Upriver workspace:"
          echo "  upriver qa <slug> --preview-url <production-url>"
