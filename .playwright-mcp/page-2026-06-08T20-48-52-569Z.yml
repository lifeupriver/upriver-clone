                - generic [ref=e208]:
                  - paragraph [ref=e209]: Ten headlines in the synthesized voice. Concrete nouns, real numbers, no superlatives.
                  - list [ref=e210]:
                    - listitem [ref=e211]: One wedding a weekend. Not three. The day is yours.
                    - listitem [ref=e212]: A 1740 farmhouse, three greenhouses, and a long table under the glass.
                    - listitem [ref=e213]: Three properties in the Hudson Valley. Each with its own weather.
                    - listitem [ref=e214]: Two hours from the city. About as far from a wedding factory as you can get.
                    - listitem [ref=e215]: The fireplace is a working fireplace. The lamb is from down the road.
                    - listitem [ref=e216]: Bring the dog. Bring the college friends. Take Old Mill for the weekend.
                    - listitem [ref=e217]: Sixteen of us. We answer the phone. Emily knows your name by Friday night.
                    - listitem [ref=e218]: Smaller weddings, off-season, at Friends and Neighbors. December through April.
                    - listitem [ref=e219]: Nineteen guest rooms, one greenhouse, one weekend that's only yours.
                    - listitem [ref=e220]: We don't have a wedding package. Every couple gets the same coordination.
