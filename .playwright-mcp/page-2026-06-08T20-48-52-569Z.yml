                  - heading "Voice in three words" [level=2] [ref=e80]
                - generic [ref=e81]:
                  - strong [ref=e82]: Quiet. Considered. Particular.
                  - paragraph
                  - paragraph [ref=e83]: "Pulled directly from Doug's answer when asked what words the brand should use: \"Quiet. Generous. Considered. Lived-in. Particular.\" (interview) These three carry the most signal because they describe both the *places* (lived-in, specific) and the *posture* (unhurried, anti-spectacle) the founders described throughout the conversation."
              - group [ref=e84]:
                - generic "▸ What the brand sounds like now" [ref=e85] [cursor=pointer]:
                  - text: ▸
                  - heading "What the brand sounds like now" [level=2] [ref=e86]
                - generic [ref=e87]:
                  - paragraph [ref=e88]:
                    - text: Verbatim from the current site and the founder interview, so we can see the gap between aspiration and execution.
                    - strong [ref=e89]: "Current on-site testimonials (the public voice today):"
                  - list [ref=e90]:
                    - listitem [ref=e91]: "\"An unforgettable wedding experience!\" — Sarah Williams (current site)"
                    - listitem [ref=e92]: "\"Magical venue with top-notch service.\" — Tom Anderson (current site)"
                    - listitem [ref=e93]: "\"The Greenhouses was the perfect venue for our wedding!\" — Jane Smith (current site)"
                    - listitem [ref=e94]: "\"Amazing service and beautiful location.\" — Mark Johnson (current site)"
                  - strong [ref=e95]: "Current site language flagged in the audit:"
                  - text: "\"stunning\" (3 pages), \"elevate\" (2 pages), \"seamlessly\" (2 pages), \"transform\" (2 pages) — all words Doug and Sally explicitly reject. (audit)"
                  - strong [ref=e96]: "How the founders actually talk (the voice we want):"
                  - list [ref=e97]:
                    - listitem [ref=e98]: "\"The greenhouse smells like the geraniums in the corner. The fireplace is a working fireplace, not a fake one. The food at Old Mill last weekend was lamb shoulder from the farm down the road.\" (interview, Sally)"
                    - listitem [ref=e99]: "\"We try to write like we would write a postcard from a friend who just stayed there.\" (interview, Sally)"
                    - listitem [ref=e100]: "\"We have one wedding a weekend in season. Not three. Not a Friday-Saturday-Sunday turnover. One. The day is theirs.\" (interview, Doug)"
                    - listitem [ref=e101]: "\"Magic is a word that gets used by people trying to sell you something.\" (interview, Doug)"
                  - paragraph
                  - paragraph [ref=e102]: The current site sounds like every other wedding venue. The interview sounds like Audrey's Farmhouse. The job of this guide is to close that gap.
              - group [ref=e103]:
                - generic "▸ What it should sound like" [ref=e104] [cursor=pointer]:
                  - text: ▸
                  - heading "What it should sound like" [level=2] [ref=e105]
                - generic [ref=e106]:
                  - paragraph [ref=e107]:
                    - text: Five rewrites in the founders' actual vocabulary. Each one swaps abstract praise for concrete, sensory, specific writing — the "postcard from a friend" register Sally named.
                    - strong [ref=e108]: 1. Hero copy
                  - list [ref=e109]:
                    - listitem [ref=e110]: "*Before (current style):* \"A stunning Hudson Valley venue where unforgettable moments come to life.\""
                    - listitem [ref=e111]: "*After:* \"A 1740 farmhouse, three glass greenhouses, and one wedding a weekend. Two hours from the city, in Wallkill, New York.\""
                  - strong [ref=e112]: 2. Property card (Old Mill)
                  - list [ref=e113]:
                    - listitem [ref=e114]: "*Before:* \"Discover the magic of Old Mill — a unique escape with rustic charm.\""
                    - listitem [ref=e115]: "*After:* \"Twenty-four acres, a 4,500-square-foot pergola, seven lodging units, and a 19th-century farmhouse. Bring the dog. Bring the college friends. Take the whole place for the weekend.\""
                  - strong [ref=e116]: 3. About / who we are
                  - list [ref=e117]:
                    - listitem [ref=e118]: "*Before:* \"Our world-class team is dedicated to creating your perfect day.\""
                    - listitem [ref=e119]: "*After:* \"Sixteen of us, full-time and seasonal. Sally and Doug answer the phone. Emily knows your name by Friday night. The chef walks through dinner to see how it's going.\""
                  - strong [ref=e120]: 4. Pets page intro
                  - list [ref=e121]:
                    - listitem [ref=e122]: "*Before:* \"We're proud to offer a pet-friendly experience.\""
                    - listitem [ref=e123]: "*After:* \"About a third of the people who book Old Mill are bringing a dog. Here's the fee, where they can sleep, where they can run, and which porch has the best napping sun.\""
                  - strong [ref=e124]: 5. FAQ entry — "Can we have a campfire?"
                  - list [ref=e125]:
                    - listitem [ref=e126]: "*Before:* \"Please inquire about outdoor fire amenities.\""
                    - listitem [ref=e127]: "*After:* \"Yes, at Old Mill and Friends and Neighbors. We light it for you, we keep it stocked, and we put it out before bed so you don't have to think about it.\""
                  - paragraph
              - group [ref=e128]:
                - generic "▸ Tone guidelines" [ref=e129] [cursor=pointer]:
                  - text: ▸
                  - heading "Tone guidelines" [level=2] [ref=e130]
                - generic [ref=e131]:
                  - list [ref=e132]:
                    - listitem [ref=e133]:
                      - strong [ref=e134]: Specific over superlative.
                      - text: Name the thing, not the feeling. "The hero of an event isn't a feeling, it's a thing — the long table, the candles in the greenhouse, the dog asleep on the porch, the cheese board on the kitchen island." (interview)
                    - listitem [ref=e135]:
                      - strong [ref=e136]: Honest over performed.
                      - text: "\"Less performance. More honesty.\" (interview, Doug) If the room is small in winter, say so. If we don't sleep 200 guests, say so."
                    - listitem [ref=e137]:
                      - strong [ref=e138]: Quietly confident, never boastful.
                      - text: "\"Magic is a word that gets used by people trying to sell you something.\" (interview, Doug) We don't claim magic. We describe what's actually there."
                    - listitem [ref=e139]:
                      - strong [ref=e140]: Warm but unhurried.
                      - text: "\"What would we want at our own wedding? And the answer was always: less of that, more of this.\" (interview, Sally) The pace of the writing should match the pace of a weekend here."
                    - listitem [ref=e141]:
                      - strong [ref=e142]: Run by people, not a brand.
                      - text: "\"Sally and Doug aren't a brand. We are people. We answer the phone.\" (interview, Sally) First-person plural is fine. Names are better than titles."
                    - listitem [ref=e143]:
                      - strong [ref=e144]: Self-selecting, not selling.
                      - text: "\"Inquiries that are better qualified… If the new site sets expectations, we should see better-fit inquiries.\" (interview, Sally) Tell people who we *aren't* for. The right couples will lean in."
                    - listitem [ref=e145]:
                      - strong [ref=e146]: Postcard, not press release.
                      - text: "\"We try to write like we would write a postcard from a friend who just stayed there.\" (interview, Sally) Short sentences. Concrete nouns. No adjective stacks."
                  - paragraph
