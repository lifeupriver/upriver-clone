              - group [ref=e221]:
                - generic "▸ Voice do's and don'ts" [ref=e222] [cursor=pointer]:
                  - text: ▸
                  - heading "Voice do's and don'ts" [level=2] [ref=e223]
                - generic [ref=e224]:
                  - strong [ref=e225]: "Do:"
                  - list [ref=e226]:
                    - listitem [ref=e227]:
                      - strong [ref=e228]: Name the thing.
                    - listitem [ref=e229]: "Don't: \"Our charming bridal suite offers a unique getting-ready experience.\""
                    - listitem [ref=e230]: "Do: \"If you'd rather get ready in the kitchen, you can. People do.\""
                    - listitem [ref=e231]:
                      - strong [ref=e232]: Use real numbers.
                    - listitem [ref=e233]: "Don't: \"Our spacious main venue accommodates large gatherings.\""
                    - listitem [ref=e234]: "Do: \"3,000 square feet under glass. Up to 150 seated.\""
                    - listitem [ref=e235]:
                      - strong [ref=e236]: Tell people who we aren't for.
                    - listitem [ref=e237]: "Don't: \"Perfect for every couple's dream wedding.\""
                    - listitem [ref=e238]: "Do: \"If you want 200 guests on-site at the Greenhouses, we're not the right place. Friends and Neighbors might be.\""
                    - listitem [ref=e239]:
                      - strong [ref=e240]: Use the team's first names.
                    - listitem [ref=e241]: "Don't: \"Our experienced coordinators will guide you through the process.\""
                    - listitem [ref=e242]: "Do: \"Emily runs your wedding from the day you book until the day after.\""
                    - listitem [ref=e243]:
                      - strong [ref=e244]: Write like a postcard.
                    - listitem [ref=e245]: "Don't: \"Experience the unparalleled beauty of our seasonal floral installations.\""
                    - listitem [ref=e246]: "Do: \"The geraniums in the corner of the greenhouse are still the original ones.\""
                  - strong [ref=e247]: "Don't:"
                  - list [ref=e248]:
                    - listitem [ref=e249]:
                      - strong [ref=e250]: Don't promise feelings.
                    - listitem [ref=e251]: "Avoid: \"An unforgettable, magical day.\""
                    - listitem [ref=e252]: Replace with the things that produce the feeling — the fireplace, the table, the candles, the dog.
                    - listitem [ref=e253]:
                      - strong [ref=e254]: Don't use industry jargon.
                    - listitem [ref=e255]: "Avoid: \"Turnkey wedding packages with seamless vendor coordination.\""
                    - listitem [ref=e256]: "Replace with plain English: \"We coordinate every wedding ourselves. There aren't tiers.\""
                    - listitem [ref=e257]:
                      - strong [ref=e258]: Don't stack adjectives.
                    - listitem [ref=e259]: "Avoid: \"A stunning, elegant, charming, rustic, unforgettable venue.\""
                    - listitem [ref=e260]: "Replace with one specific noun: \"A c. 1740 farmhouse on a former flower nursery.\""
                    - listitem [ref=e261]:
                      - strong [ref=e262]: Don't claim uniqueness.
                    - listitem [ref=e263]: "Avoid: \"A truly one-of-a-kind venue.\""
                    - listitem [ref=e264]: "Replace with the actual differentiator: \"One wedding a weekend. Three properties, each different.\""
                    - listitem [ref=e265]:
                      - strong [ref=e266]: Don't hide behind "we."
                    - listitem [ref=e267]: "Avoid: \"Our team is dedicated to your event.\""
                    - listitem [ref=e268]: "Replace with names: \"Sally, Doug, Emily, and Michael. Sixteen of us when you count the rest of the team.\""
