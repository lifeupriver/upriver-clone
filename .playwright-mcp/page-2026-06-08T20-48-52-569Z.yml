              - group [ref=e269]:
                - generic "▸ Audience profile" [ref=e270] [cursor=pointer]:
                  - text: ▸
                  - heading "Audience profile" [level=2] [ref=e271]
                - generic [ref=e272]:
                  - paragraph [ref=e273]:
                    - text: Pulled from Sally and Doug's description in the interview. Two distinct jobs-to-be-done.
                    - strong [ref=e274]: Primary segment — wedding couples
                  - list [ref=e275]:
                    - listitem [ref=e276]: "*Profile:* 30–38 years old, household income roughly $200K–$500K, almost always from NYC metro, occasionally Boston or Philly, together 5–10 years, often in creative or design-adjacent fields — \"architects, editors, brand people, a lot of people in food.\" (interview, Sally)"
                    - listitem [ref=e277]: "*Functional JTBD:* Host a wedding for ~80–150 guests within a two-hour drive of the city, with on-site lodging for at least the immediate party."
                    - listitem [ref=e278]: "*Emotional JTBD:* Feel that the day is theirs and not a template. \"That nothing about the day felt like a wedding-industrial-complex transaction.\" (interview, Sally)"
                    - listitem [ref=e279]: "*Social JTBD:* Have guests ask, \"where did you find this place?\" (interview, Sally)"
                    - listitem [ref=e280]: "*Trigger event:* \"They've toured a couple of 'wedding factories' and felt sick. They've seen the day-of-week pricing tier sheet and the sign that says 'no candles' and the dance floor that obviously gets reused, and they want out.\" (interview, Sally)"
                    - listitem [ref=e281]: "*Alternatives considered:* Hutton Brickyards, Roxbury Barn (named in interview), generic Hudson Valley barn venues, destination weddings."
                    - listitem [ref=e282]: "*Key vocabulary they use:* \"wedding factory,\" \"destination feeling,\" \"two-hour drive\" (all from interview)."
                  - strong [ref=e283]: Secondary segment — lodging guests
                  - list [ref=e284]:
                    - listitem [ref=e285]: "*Profile:* Couples and small groups, 30–50, NYC, often bringing a dog (\"probably a third of our lodging bookings mention bringing a dog\" — interview, Emily)."
                    - listitem [ref=e286]: "*Functional JTBD:* Find a house for a weekend trip that sleeps a group, allows pets, and isn't an Airbnb."
                    - listitem [ref=e287]: "*Emotional JTBD:* \"Airbnb fatigue is real. People want a place that's run by humans they can text.\" (interview, Emily)"
                    - listitem [ref=e288]: "*Trigger event:* A friend's birthday weekend, an anniversary, a small reunion, or having attended a wedding at the property and wanting to come back as a guest. (interview, Sally — \"I want guests to leave a wedding here, go home, look us up, and book a long weekend stay.\")"
                    - listitem [ref=e289]: "*Search vocabulary:* \"house rental Hudson Valley dog friendly\" (interview, Emily, near-verbatim)."
                  - paragraph
                  - paragraph [ref=e290]:
                    - text: "*Confidence note:* Both segments are sourced only from the founder interview (single source). Per the skill's guardrails, this is"
                    - strong [ref=e291]: Medium confidence
                    - text: — the founders see thousands of inquiries a year, but we have no direct customer-side data points to triangulate. Mined public reviews returned no usable verbatims (see Confidence notes below).
              - group [ref=e292]:
                - generic "▸ Content type guidance" [ref=e293] [cursor=pointer]:
                  - text: ▸
                  - heading "Content type guidance" [level=2] [ref=e294]
                - generic [ref=e295]:
                  - strong [ref=e296]: Homepage hero
                  - list [ref=e297]:
                    - listitem [ref=e298]: One sentence, concrete nouns, geographic anchor. No adjectives ending in -ing.
                    - listitem [ref=e299]: "*Pattern:* \"[Specific thing] in [specific place]. [What you do here].\""
                    - listitem [ref=e300]: "*Example:* \"A 1740 farmhouse and three glass greenhouses in Wallkill, New York. We host one wedding a weekend.\""
                  - strong [ref=e301]: Inquiry form
                  - list [ref=e302]:
                    - listitem [ref=e303]: Treat it like a conversation, not a CRM intake. Match Emily's voice.
                    - listitem [ref=e304]: "*Intro line:* \"Tell us a little. Emily reads every one of these and writes back the same day.\""
                    - listitem [ref=e305]: "*Field framing:* \"Roughly when?\" not \"Preferred Event Date (MM/DD/YYYY) (required).\""
                    - listitem [ref=e306]: "Set expectations on next steps in plain English: \"We'll send a packet with pricing and what's included. If it's a fit, we'll set up a tour.\""
                  - strong [ref=e307]: Email auto-reply (post-inquiry)
                  - list [ref=e308]:
                    - listitem [ref=e309]: Signed by a real person (Emily).
                    - listitem [ref=e310]: Confirms what's coming and when. No corporate "thank you for reaching out."
                    - listitem [ref=e311]: "*Example opener:* \"Thanks — got it. I'll write back today or tomorrow with a packet and a few times for a tour. — Emily\""
                  - strong [ref=e312]: Instagram caption
                  - list [ref=e313]:
                    - listitem [ref=e314]: One observation, one detail, one credit.
                    - listitem [ref=e315]: "*Pattern:* \"[Sensory detail from the day]. [One specific thing — the food, the flowers, the light]. [Photographer credit.]\""
                    - listitem [ref=e316]: "*Example:* \"Long table under the glass on Saturday. Lamb shoulder from the farm down the road, geraniums from the corner of the greenhouse. Photo by Kate Edwards.\""
                  - strong [ref=e317]: FAQ entry
                  - list [ref=e318]:
                    - listitem [ref=e319]: Question in the way a guest would ask it. Answer in two to four sentences. End with what to do next if they want more.
                    - listitem [ref=e320]:
                      - text: "*Example:*"
                      - strong [ref=e321]: "\"Can we have a campfire?\""
                      - text: Yes, at Old Mill and Friends and Neighbors — not at the Greenhouses (the glass and the candles are enough). We light it, we stock it, and we put it out before bed. If you want s'mores, tell Emily a week out and she'll have the kit ready.
