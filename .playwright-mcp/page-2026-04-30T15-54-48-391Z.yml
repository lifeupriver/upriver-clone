        - heading "Group D — Curriculum & approach" [level=2] [ref=e193]
        - heading "What does \"Montessori-inspired\" mean here?" [level=3] [ref=e194]
        - text: We draw from the Montessori method without claiming full AMI or AMS accreditation. In practice, that means a prepared environment, mixed-age classrooms, hands-on materials (sandpaper letters, golden beads, practical-life shelves), a three-hour uninterrupted work cycle, and guides trained to observe and introduce lessons when a child is ready.
        - heading "How is the classroom set up?" [level=3] [ref=e195]
        - text: The room is set up so a 3-year-old can pour their own water, choose their own work, and put materials back. Materials are arranged by area — practical life, sensorial, language, math, geography, art — and children move freely between them.
        - heading "What ages share a classroom?" [level=3] [ref=e196]
        - text: Children of mixed ages 2.5 to 6 share the classroom — not split into traditional grade levels. Younger children learn from older ones modeling work; older children consolidate skills by teaching.
        - heading "What's the child-to-guide ratio?" [level=3] [ref=e197]
        - strong [ref=e198]: "[CONFIRM]"
        - text: — ratio, maximum class size, and number of trained guides per room.
        - heading "Are your guides AMI- or AMS-certified?" [level=3] [ref=e199]
        - strong [ref=e200]: "[CONFIRM]"
        - text: "— credential level for each lead guide. Be specific: \"Lead guide [Name] is AMS-certified at the Early Childhood level. Assistant guide [Name] is in training.\""
        - heading "How do you teach reading?" [level=3] [ref=e201]
        - strong [ref=e202]: "[FILL IN]"
        - text: "— typically the Montessori path: sandpaper letters, sound games, movable alphabet, then early reading. Be explicit if you supplement with phonics, sight words, or a non-Montessori curriculum."
        - heading "How do you teach math?" [level=3] [ref=e203]
        - strong [ref=e204]: "[FILL IN]"
        - text: — number rods, sandpaper numbers, golden beads, decimal system materials.
        - heading "Do you do science, geography, art, music?" [level=3] [ref=e205]
        - text: Yes. The classroom includes a continents map, plant and animal materials, easel work and clay, and weekly music.
        - strong [ref=e206]: "[CONFIRM]"
        - text: whether music is in-house or by a visiting teacher.
        - heading "What's your screen and tech policy?" [level=3] [ref=e207]
        - text: We do not use screens in the classroom.
        - strong [ref=e208]: "[CONFIRM]"
        - text: whether parents have classroom-photo access via a private app and whether older children encounter any tech.
