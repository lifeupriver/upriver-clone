      - generic [ref=e31]:
        - heading "Brand Voice Guide — Little Friends Learning Loft" [level=1] [ref=e32]
        - blockquote [ref=e33]:
          - strong [ref=e34]: "Status: Draft (pre-interview)."
          - text: Built from the audit, mined Google reviews, and the public site. The live interview (use
          - code [ref=e35]: interview-guide.md
          - text: ) will overwrite the speculative parts. Sections marked
          - strong [ref=e36]: "[CONFIRM]"
          - text: need explicit client validation.
        - heading "Who is the audience" [level=2] [ref=e37]
        - paragraph [ref=e38]: Hudson Valley parents of children ages 2.5 to 6 who are actively researching Montessori or full-day preschool options. They're reading several school websites in parallel, comparing schedules, philosophy, and tuition. Most are dual-income, looking for full-day coverage with credible educational substance — not just childcare. Many are first-time preschool parents and underestimate how often they'll Google specific questions ("nap time," "potty training," "what to bring on day one") between tour and enrollment.
        - paragraph [ref=e39]:
          - text: A meaningful minority are second-time parents who were burned by a prior preschool experience and are looking for adults who understand child development without being preachy.
          - strong [ref=e40]: "[CONFIRM]"
          - text: — confirm whether you market to first-time vs. second-time parents differently.
        - heading "Tone in one sentence" [level=2] [ref=e41]
        - paragraph [ref=e42]: Warm, grounded, and respectful of parents — practical and specific about what Montessori practice looks like at Little Friends, never saccharine, never marketing-heavy, and never coy about logistics.
        - heading "Voice characteristics" [level=2] [ref=e43]
        - list [ref=e44]:
          - listitem [ref=e45]:
            - strong [ref=e46]: Concrete and observational.
            - text: Describe what a child does in the classroom, not what they "experience."
          - listitem [ref=e47]:
            - strong [ref=e48]: Respectful of parents' intelligence.
            - text: No baby-talk in adult-facing copy. Trust the reader to handle a real schedule, a real number, a real policy.
          - listitem [ref=e49]:
            - strong [ref=e50]: Calm, never breathless.
            - text: No exclamation points. No "We're SO excited about…" energy.
          - listitem [ref=e51]:
            - strong [ref=e52]: Specific about Montessori method.
            - text: When you say "Montessori-inspired," explain in the same sentence what that means at LFLL.
          - listitem [ref=e53]:
            - strong [ref=e54]: Rooted in place.
            - text: Newburgh, the Hudson Valley, the JCC building — anchor copy in real geography.
          - listitem [ref=e55]:
            - strong [ref=e56]: Honest about what we are and aren't.
            - text: "\"We're a small school by design\" is more compelling than \"world-class.\""
          - listitem [ref=e57]:
            - strong [ref=e58]: Warm without being sugary.
            - text: Children are children — not "tiny scholars," "little learners," or "loved ones."
        - heading "Keywords / repeated phrases (use these — they are us)" [level=2] [ref=e59]
        - list [ref=e60]:
          - listitem [ref=e61]: Montessori-inspired
          - listitem [ref=e62]: prepared environment
          - listitem [ref=e63]: mixed-age classroom
          - listitem [ref=e64]: hands-on learning
          - listitem [ref=e65]: ages 2.5–6 (or 2.5 to 6)
          - listitem [ref=e66]: full-day preschool
          - listitem [ref=e67]: before-care and after-care
          - listitem [ref=e68]: Newburgh
          - listitem [ref=e69]: Hudson Valley
          - listitem [ref=e70]: Newburgh JCC
          - listitem [ref=e71]: guided independence
          - listitem [ref=e72]: practical life
        - heading "Banned words / phrases (do not use these — they are not us)" [level=2] [ref=e73]
        - list [ref=e74]:
          - listitem [ref=e75]: magical
          - listitem [ref=e76]: transform / transformative
          - listitem [ref=e77]: world-class
          - listitem [ref=e78]: premier
          - listitem [ref=e79]: robust
          - listitem [ref=e80]: seamlessly
          - listitem [ref=e81]: nurturing journey
          - listitem [ref=e82]: endless possibilities
          - listitem [ref=e83]: tiny scholars / little learners / little ones
          - listitem [ref=e84]: "\"unlock your child's potential\""
          - listitem [ref=e85]: "\"We are so excited / proud / passionate to…\""
        - strong [ref=e86]: "[CONFIRM during interview]"
        - text: — head of school may want to defend "magical" in one specific context (Probe 3 in interview guide). Allow that one use; clean the rest.
        - heading "Sentence rhythm" [level=2] [ref=e87]
        - list [ref=e88]:
          - listitem [ref=e89]: Short sentences earn the long ones. Mix 6-word and 22-word sentences. Avoid the metronome of always-15-word marketing prose.
          - listitem [ref=e90]: Lead with the noun, not the adjective. "A 4-year-old learning to tie shoes" beats "A delightful learning moment."
          - listitem [ref=e91]: "Active voice, present tense for classroom descriptions: \"Children pour their own water,\" not \"Water is poured by children.\""
        - heading "Headlines — yes / no examples" [level=2] [ref=e92]
        - paragraph [ref=e93]: "| Right (use) | Wrong (avoid) | |---|---| | A full-day Montessori preschool in Newburgh, NY | Where Little Hearts Bloom | | What a Montessori day looks like at Little Friends | Discover the Magic of Montessori | | Mixed-age classrooms for children 2.5 to 6 | Ages 2.5 to 6 — Where Little Friends Become Big Friends | | Tour the classroom: 290 North Street, Newburgh | Come See What Makes Us Special | | Enrollment for Fall 2026 is open | Join Our Family! | | How we teach reading, math, and practical life | A Holistic Approach to Early Learning |"
        - heading "Body copy — yes / no examples" [level=2] [ref=e94]
        - strong [ref=e95]: Right (use)
        - text: ":"
        - blockquote [ref=e96]: Little Friends Learning Loft is a Montessori-inspired preschool at the Newburgh JCC, serving children ages 2.5 to 6. We run mixed-age classrooms, full-day schedules, and before- and after-care so working families don't have to piece together coverage. Tours run on Tuesdays and Thursdays — book one below or call (845) 561-6602.
        - strong [ref=e97]: Wrong (avoid)
        - text: ":"
        - blockquote [ref=e98]: At Little Friends Learning Loft, we believe every child is born with a natural curiosity that, when nurtured in the right environment, can blossom into a lifelong love of learning. Our state-of-the-art Montessori-inspired program is designed to unlock each child's unique potential through a holistic, whole-child approach.
        - heading "How we talk about Montessori" [level=2] [ref=e99]
        - list [ref=e100]:
          - listitem [ref=e101]: Always couple "Montessori-inspired" with one concrete detail in the same paragraph (e.g., "Montessori-inspired — our guides use sandpaper letters, golden beads, and a three-hour uninterrupted work cycle").
          - listitem [ref=e102]:
            - text: We are not AMI- or AMS-certified [
            - strong [ref=e103]: CONFIRM
            - text: "]. Be honest about scope: \"We draw from the Montessori method without claiming full AMI/AMS accreditation.\" Parents who care about the distinction will respect this; parents who don't will skim past it."
          - listitem [ref=e104]: Never use "Montessori" as a vague vibe word. If you can't show the practice, don't use the word.
        - heading "How we talk about the JCC" [level=2] [ref=e105]
        - paragraph [ref=e106]:
          - text: The school is physically located inside the Newburgh JCC.
          - strong [ref=e107]: "[CONFIRM]"
          - text: — confirm whether LFLL is a JCC program, a JCC tenant, or a JCC partnership.
        - list [ref=e108]:
          - listitem [ref=e109]: "Default framing: \"Little Friends Learning Loft is housed inside the Newburgh JCC at 290 North Street.\" Location anchor first; affiliation question handled in a dedicated FAQ."
          - listitem [ref=e110]: Address parental concern about religious affiliation in the FAQ, not in marketing prose. Do not over-explain or sound apologetic.
          - listitem [ref=e111]: Use the JCC for discoverability (LocalBusiness schema, geo coordinates, footer address) — not as a brand identity.
        - heading "How we talk about tuition (if approved)" [level=2] [ref=e112]
        - strong [ref=e113]: "[CONFIRM]"
        - text: — whether tuition publishes publicly, gates behind a form, or stays "contact us only."
        - paragraph
        - paragraph [ref=e114]: "If publishing:"
        - list [ref=e115]:
          - listitem [ref=e116]: State a single specific number, not a range. "Full-day five days a week is $X for 2026–27."
          - listitem [ref=e117]: Always pair with what's included (lunch, materials, before/after-care).
          - listitem [ref=e118]: Pair with the deposit, payment cadence, and any sibling discount in the same block.
          - listitem [ref=e119]: Avoid "tuition" alone as a heading; use "Tuition & Schedule."
        - heading "How we talk about competitors" [level=2] [ref=e120]
        - paragraph [ref=e121]: "We don't, by name. But we do answer \"how is LFLL different from the JCC's other programs / public pre-K / a daycare\" in indirect language:"
        - list [ref=e122]:
          - listitem [ref=e123]: "Right: \"We're a small school by design. Two mixed-age classrooms, two trained guides, and a three-hour work cycle that doesn't get interrupted by classroom transitions.\""
          - listitem [ref=e124]: "Wrong: \"Unlike public pre-K, where children sit at desks…\""
        - heading "What we never say" [level=2] [ref=e125]
        - list [ref=e126]:
          - listitem [ref=e127]: "\"Family.\" (We're a school, not a family.) Replace with \"community,\" \"school community,\" or \"current families.\""
          - listitem [ref=e128]: "\"Journey.\" (Inflated and overused.) Replace with the specific phase: \"the year before kindergarten,\" \"the toddler year.\""
          - listitem [ref=e129]: Anything that implies guaranteed academic outcomes. We educate; we don't guarantee.
        - heading "Checking voice — quick test" [level=2] [ref=e130]
        - paragraph [ref=e131]: If you'd be embarrassed to read the sentence aloud to a parent in the doorway, it's wrong. If a guide could deliver it as part of a tour without changing a word, it's right.
