        - generic [ref=e41]:
          - heading "What's working" [level=3] [ref=e42]
          - paragraph [ref=e43]: The visual identity is solid — the logo, color palette, and warm photography read appropriately for a Montessori preschool, and the design audit scored 90/100. The site is also well-connected internally for a 13-page site, with a clean link structure (83/100) and no obvious broken navigation. A real Google Business Profile is in place with a 5.0 rating, and 37 calls-to-action are sprinkled across the site, so the wiring for inquiries exists — it just isn't pointed at the right pages.
        - generic [ref=e44]:
          - heading "What's costing you inquiries" [level=3] [ref=e45]
          - paragraph [ref=e46]: "**Search engines can't tell what most of your pages are about.** 12 of 13 pages have no H1 heading, the homepage and 10 others are missing meta descriptions, and one page has no title tag at all. To Google, these pages look like a sitemap of unlabeled boxes — and they're being passed over for competitor preschools that label their content properly. **There's no LocalBusiness schema, no FAQ content, and no summary blocks.** That means the site is invisible in two of the highest-intent surfaces a Hudson Valley parent will use: Google's local pack (\"Montessori preschool near me\") and AI search (\"what Montessori schools take 3-year-olds in Newburgh?\"). With 0 detected FAQ entries on a school site, you're losing parents at the research stage before they ever see your phone number. **Your contact and trust signals are scattered.** Three different phone numbers appear on the site — (732) 343-0005, (845) 561-6602, and 732-343-0005 — which both confuses parents and tanks local search rankings. The contact page isn't directly linked from the homepage hero, and there are no Facebook or Instagram links visible despite an active Facebook page with 430+ followers."
        - generic [ref=e47]:
          - heading "What we're recommending" [level=3] [ref=e48]
          - paragraph [ref=e49]: "A four-phase rebuild on a modern stack, replacing the current Square-based site. Phase 1 (1–2 weeks) ships the quick wins — fix titles, descriptions, H1s, NAP consistency, and the homepage CTA path. Phase 2 (2–4 weeks) rebuilds the structural layer: LocalBusiness schema, canonical tags, design system, and the missing About / Tuition / Day-in-the-life pages. Phases 3 and 4 (6–12 weeks) build the FAQ library, AI-search readiness (TL;DRs, llms.txt, Hudson Valley keyword density), and directory citations. The first two phases alone should move the overall score from 72 to the mid-80s and meaningfully increase tour requests within the first month live."
