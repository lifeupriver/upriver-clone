            - generic [ref=f1e15]:
              - img "Children at Little Friends practicing yoga in the grass outside the Newburgh JCC" [ref=f1e16]
              - generic [ref=f1e18]:
                - heading "Welcome to Little Friends Learning Loft!" [level=1] [ref=f1e19]
                - paragraph [ref=f1e20]:
                  - text: A Full Day, Montessori inspired Preschool at
                  - text: the Newburgh JCC serving children ages 2.5 - 6
                  - text: "Offering extended day: before care, after care and half day"
            - generic [ref=f1e21]:
              - img "The Newburgh JCC building exterior, home of Little Friends Learning Loft" [ref=f1e22]
              - generic [ref=f1e23]:
                - heading "Our Mission" [level=2] [ref=f1e24]
                - paragraph [ref=f1e25]: At Little Friends Learning Loft, we are all passionate about providing a safe setting that ensures peace, empathy and compassion. Respect is modeled, taught and practiced. Our intentional and nurturing environment is founded on the Montessori principles of hands-on learning, self-discovery, cooperation and independence. The multi-age group benefits apply to all; younger children learn by observing their older classmates and older children gain the satisfaction and confidence that comes from providing support and encouragement. Years 1, 2 and 3 are designed to help students reach multiple tiers of educational, social and emotional goals at a pace befitting each individual learner.
            - generic [ref=f1e27]:
              - img "Children working in the Little Friends Learning Loft classroom" [ref=f1e29]
              - generic [ref=f1e30]:
                - heading "Child-led play" [level=2] [ref=f1e31]
                - paragraph [ref=f1e32]: We invite individually motivated experiences and practice exploration in our playground, garden, yoga studio, gymnasium, art room and library all while nourishing a spiritual sense of wonder and respect for our natural world and its inhabitants. Providing these introductions and promoting self-paced learning environments encourages autonomy, character development and helps raise good citizens for our future.
            - generic [ref=f1e34]:
              - blockquote [ref=f1e35]: “We had heard how wonderful Little Friends Learning Loft was, but seeing it in action blew us away. As parents, you want your child to find a place that fosters curiosity but still maintains a sense of control, teaches compassion and connectedness, but still encourages individuality. What they’ve built here is a special kind of magic, and we’re just thrilled that our son can be part of it. He truly loves being there!”
              - paragraph [ref=f1e36]: — Renata Kero, Cold Spring
